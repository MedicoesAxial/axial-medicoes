<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Axial Medições — Login</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="assets/logo.png" alt="Construtora Axial">
      <h1>Sistema de Medições</h1>
      <div id="msg"></div>
      <form id="formLogin">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="username">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required autocomplete="current-password">
        <button type="submit" class="btn btn-primary btn-full" id="btnEntrar">Entrar</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const msg = document.getElementById('msg');
    // se já logado, vai direto pro app
    supabaseClient.auth.getSession().then(({data})=>{
      if(data.session) location.href = 'app.html';
    });

    document.getElementById('formLogin').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const btn = document.getElementById('btnEntrar');
      btn.disabled = true; btn.textContent = 'Entrando...';
      msg.innerHTML = '';
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('senha').value
      });
      if(error){
        msg.innerHTML = '<div class="msg msg-erro">E-mail ou senha inválidos.</div>';
        btn.disabled = false; btn.textContent = 'Entrar';
      } else {
        location.href = 'app.html';
      }
    });
  </script>
</body>
</html>
