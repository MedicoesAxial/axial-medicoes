<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Axial Medições</title>
<style>
:root{
  --axial-azul:#1B7BB8;
  --axial-azul-claro:#4BA3D3;
  --axial-azul-escuro:#155F8F;
  --cinza-texto:#3a3f44;
  --cinza-borda:#d8dee4;
  --cinza-fundo:#f4f6f8;
  --cinza-claro:#fbfcfd;
  --verde:#2e9e5b;
  --vermelho:#cf3b3b;
  --amarelo:#e0a106;
  --sombra:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',Arial,Helvetica,sans-serif;
  background:var(--cinza-fundo);
  color:var(--cinza-texto);
  font-size:14px;
}
a{color:var(--axial-azul);text-decoration:none}
.hidden{display:none !important}

/* ---------- LOGIN ---------- */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#eef3f7 0%,#dce6ef 100%);
}
.login-card{
  background:#fff;padding:40px;border-radius:14px;box-shadow:var(--sombra);
  width:100%;max-width:380px;text-align:center;
}
.login-card img{max-width:200px;margin-bottom:24px}
.login-card h1{font-size:18px;color:var(--axial-azul-escuro);margin-bottom:24px;font-weight:600}

/* ---------- FORM ---------- */
label{display:block;text-align:left;font-size:12px;font-weight:600;color:#667;margin:12px 0 4px}
input,select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--cinza-borda);
  border-radius:7px;font-size:14px;font-family:inherit;background:#fff;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--axial-azul);box-shadow:0 0 0 3px rgba(27,123,184,.12)}
textarea{resize:vertical;min-height:60px}

button,.btn{
  cursor:pointer;border:none;border-radius:7px;padding:9px 16px;font-size:14px;
  font-weight:600;font-family:inherit;transition:.15s;
}
.btn-primary{background:var(--axial-azul);color:#fff}
.btn-primary:hover{background:var(--axial-azul-escuro)}
.btn-secundario{background:#eef2f5;color:var(--cinza-texto)}
.btn-secundario:hover{background:#e0e6eb}
.btn-perigo{background:#fbeaea;color:var(--vermelho)}
.btn-perigo:hover{background:#f5d6d6}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;margin-top:18px}

/* ---------- LAYOUT APP ---------- */
.topbar{
  background:#fff;border-bottom:1px solid var(--cinza-borda);
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 22px;box-shadow:var(--sombra);position:sticky;top:0;z-index:50;
}
.topbar img{height:34px}
.topbar .user{display:flex;align-items:center;gap:14px;font-size:13px}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.badge-admin{background:#e7f0fa;color:var(--axial-azul-escuro)}
.badge-operador{background:#eaf6ee;color:var(--verde)}

.tabs{display:flex;gap:4px;background:#fff;padding:0 22px;border-bottom:1px solid var(--cinza-borda)}
.tab{padding:12px 18px;cursor:pointer;font-weight:600;color:#889;border-bottom:3px solid transparent}
.tab.ativo{color:var(--axial-azul);border-bottom-color:var(--axial-azul)}
.tab:hover{color:var(--axial-azul)}

.container{max-width:1280px;margin:22px auto;padding:0 22px}
.card{background:#fff;border-radius:12px;box-shadow:var(--sombra);padding:22px;margin-bottom:20px}
.card h2{font-size:16px;color:var(--axial-azul-escuro);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}

/* ---------- TABELAS ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--axial-azul);color:#fff;padding:9px 8px;text-align:left;font-weight:600;font-size:12px}
th.num,td.num{text-align:right}
td{padding:7px 8px;border-bottom:1px solid var(--cinza-borda)}
tr:hover td{background:var(--cinza-claro)}
tbody tr.grupo td{background:#eef3f7;font-weight:700;color:var(--axial-azul-escuro)}
.tabela-scroll{overflow-x:auto}

/* inputs dentro da tabela de medição */
table input,table select{padding:5px 6px;font-size:12px;border-radius:5px}
.col-mini{width:70px}.col-med{width:120px}

/* ---------- GRID FORM ---------- */
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* ---------- TOTAIS ---------- */
.totais{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
.total-box{background:var(--cinza-claro);border:1px solid var(--cinza-borda);border-radius:10px;padding:14px}
.total-box .rotulo{font-size:11px;color:#889;text-transform:uppercase;font-weight:700}
.total-box .valor{font-size:20px;font-weight:700;color:var(--axial-azul-escuro);margin-top:4px}
.total-box.destaque{background:var(--axial-azul);border-color:var(--axial-azul)}
.total-box.destaque .rotulo,.total-box.destaque .valor{color:#fff}

/* ---------- MENSAGENS ---------- */
.msg{padding:10px 14px;border-radius:8px;margin:12px 0;font-size:13px}
.msg-erro{background:#fbeaea;color:var(--vermelho);border:1px solid #f0c4c4}
.msg-ok{background:#eaf6ee;color:var(--verde);border:1px solid #c4e6cf}
.msg-info{background:#e7f0fa;color:var(--axial-azul-escuro);border:1px solid #c4daf0}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar .spacer{flex:1}
.lista-vazia{text-align:center;color:#99a;padding:40px 0}
.chip{display:inline-block;background:#eef3f7;padding:3px 10px;border-radius:20px;font-size:12px;margin:2px}
.acoes{display:flex;gap:6px}
small.dica{color:#99a;font-size:11px;display:block;margin-top:3px}

</style>
</head>

<script>
// ============================================================
// APP CORE - sessão, perfil, navegação, utilitários
// ============================================================
let PERFIL = null;          // { id, nome, email, role }
let OBRAS_ACESSIVEIS = [];  // obras que o usuário pode ver

// ---------- utilitários ----------
const $ = (sel, ctx=document) => ctx.querySelector(sel);
const $$ = (sel, ctx=document) => [...ctx.querySelectorAll(sel)];
const isAdmin = () => PERFIL && PERFIL.role === 'admin';

function brl(v){
  return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function num(v){ return (Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:4}); }
function dataBR(d){ if(!d) return ''; const [a,m,dd]=d.split('-'); return `${dd}/${m}/${a}`; }
function dataHoraBR(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleString('pt-BR'); }
function hojeISO(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return (s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function toast(msg, tipo='info'){
  const div = document.createElement('div');
  div.className = `msg msg-${tipo}`;
  div.textContent = msg;
  div.style.position='fixed'; div.style.top='70px'; div.style.right='22px';
  div.style.zIndex='999'; div.style.maxWidth='340px'; div.style.boxShadow='var(--sombra)';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 3500);
}

// ---------- inicialização ----------
(async function init(){
  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(!session){ mostrarLogin(); return; }

  // carrega perfil
  const { data:perfil, error } = await supabaseClient
    .from('perfis').select('*').eq('id', session.user.id).single();
  if(error || !perfil){ alert('Perfil não encontrado. Contate o administrador.'); await sair(); return; }
  PERFIL = perfil;
  mostrarApp();

  $('#userNome').textContent = perfil.nome;
  const badge = $('#userBadge');
  badge.textContent = perfil.role;
  badge.classList.add(perfil.role==='admin'?'badge-admin':'badge-operador');

  // mostra/esconde abas de admin
  if(!isAdmin()) $$('.admin-only').forEach(t=>t.classList.add('hidden'));

  // carrega obras acessíveis
  const { data:obras } = await supabaseClient.from('obras').select('*').eq('ativa', true).order('nome');
  OBRAS_ACESSIVEIS = obras || [];

  // navegação por abas
  $$('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      $$('.tab').forEach(t=>t.classList.remove('ativo'));
      tab.classList.add('ativo');
      const v = tab.dataset.view;
      ['medicoes','obras','fornecedores','contratos','operadores','acessos','historico','perfil'].forEach(name=>{
        $('#view-'+name).classList.toggle('hidden', name!==v);
      });
      renderView(v);
    });
  });

  renderView('medicoes');
})();

async function sair(){
  await supabaseClient.auth.signOut();
  mostrarLogin();
}
$('#btnSair')?.addEventListener('click', sair);

function renderView(v){
  if(v==='medicoes')     renderMedicoes();
  if(v==='obras')        renderObras();
  if(v==='fornecedores') renderFornecedores();
  if(v==='contratos')    renderContratos();
  if(v==='operadores')   renderOperadores();
  if(v==='acessos')      renderAcessos();
  if(v==='historico')    renderHistorico();
  if(v==='perfil')       renderPerfil();
}

</script>
<script>
// ============================================================
// MODULO DE MEDICOES (v2 - contratos, antes medido editavel)
// ============================================================
let UNIDADES = [];
let FORNECEDORES = [];
let CONTRATOS = [];

async function carregarRefs(){
  if(!UNIDADES.length){
    const { data:u } = await supabaseClient.from('unidades').select('*').order('sigla');
    UNIDADES = u || [];
  }
  if(!FORNECEDORES.length){
    const { data:f } = await supabaseClient.from('fornecedores').select('*').eq('ativo',true).order('nome');
    FORNECEDORES = f || [];
  }
  const { data:c } = await supabaseClient
    .from('contratos')
    .select('*, obras(nome,centro_custo), fornecedores(nome,objeto,logo_url)')
    .eq('ativo', true);
  CONTRATOS = c || [];
}

async function registrarHistorico(acao, entidade, entidade_id, detalhe){
  try{
    await supabaseClient.from('historico').insert({
      user_id: PERFIL.id, user_nome: PERFIL.nome, user_email: PERFIL.email,
      acao, entidade, entidade_id: entidade_id||null, detalhe: detalhe||null
    });
  }catch(e){ }
}

async function renderMedicoes(){
  await carregarRefs();
  const el = $('#view-medicoes');

  if(!OBRAS_ACESSIVEIS.length){
    el.innerHTML = `<div class="card"><div class="lista-vazia">
      Você ainda não tem nenhuma obra liberada.<br>Solicite ao administrador.</div></div>`;
    return;
  }

  const { data:medicoes } = await supabaseClient
    .from('medicoes')
    .select('*, obras(nome), fornecedores(nome)')
    .order('criado_em',{ascending:false});

  const linhas = (medicoes||[]).map(m=>`
    <tr>
      <td>${esc(m.obras?.nome||'')}</td>
      <td>${esc(m.fornecedores?.nome||'')}</td>
      <td class="num">${m.rm_numero}</td>
      <td>${dataBR(m.periodo_inicio)} a ${dataBR(m.periodo_fim)}</td>
      <td><span class="badge ${m.status==='finalizada'?'badge-admin':'badge-operador'}">${m.status}</span></td>
      <td class="acoes">
        <button class="btn btn-secundario btn-sm" onclick="abrirMedicao('${m.id}')">Abrir</button>
        ${isAdmin()?`<button class="btn btn-perigo btn-sm" onclick="excluirMedicao('${m.id}')">Excluir</button>`:''}
      </td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="card">
      <h2>Medições
        <button class="btn btn-primary btn-sm" onclick="novaMedicao()">+ Nova medição</button>
      </h2>
      <div class="tabela-scroll">
        <table>
          <thead><tr><th>Obra</th><th>Fornecedor</th><th class="num">RM</th><th>Período</th><th>Status</th><th></th></tr></thead>
          <tbody>${linhas || '<tr><td colspan="6" class="lista-vazia">Nenhuma medição ainda.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

async function excluirMedicao(id){
  if(!confirm('Excluir esta medição e todos os seus itens? Esta ação não pode ser desfeita.')) return;
  await supabaseClient.from('medicoes').delete().eq('id', id);
  registrarHistorico('excluiu medição', 'medicao', id);
  toast('Medição excluída.','ok');
  renderMedicoes();
}

async function novaMedicao(){
  const el = $('#view-medicoes');

  if(!CONTRATOS.length){
    el.innerHTML = `
      <div class="card">
        <h2>Nova medição <button class="btn btn-secundario btn-sm" onclick="renderMedicoes()">Voltar</button></h2>
        <div class="msg msg-info">Nenhum contrato cadastrado ainda.
        ${isAdmin()?'Cadastre um contrato na aba <strong>Contratos</strong> (fornecedor + obra).':'Solicite ao administrador o cadastro do contrato.'}</div>
      </div>`;
    return;
  }

  const optsContrato = CONTRATOS.map(c=>{
    const rotulo = `${c.obras?.nome||''} - ${c.fornecedores?.nome||''}${c.numero?(' ('+c.numero+')'):''}`;
    return `<option value="${c.id}" data-objeto="${esc(c.objeto||c.fornecedores?.objeto||'')}">${esc(rotulo)}</option>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <h2>Nova medição <button class="btn btn-secundario btn-sm" onclick="renderMedicoes()">Voltar</button></h2>
      <div id="msgNova"></div>
      <div class="grid grid-3">
        <div style="grid-column:1/-1"><label>Contrato (obra + fornecedor)</label><select id="nm_contrato">${optsContrato}</select></div>
        <div><label>RM nº</label><input type="number" id="nm_rm" value="1" min="1"></div>
        <div><label>Período - início</label><input type="date" id="nm_ini" value="${hojeISO()}"></div>
        <div><label>Período - fim</label><input type="date" id="nm_fim" value="${hojeISO()}"></div>
        <div><label>Mês de referência</label><input type="month" id="nm_mes"></div>
        <div style="grid-column:1/-1"><label>Objeto</label><input type="text" id="nm_obj" placeholder="LOCAÇÃO DE EQUIPAMENTOS"></div>
      </div>
      <small class="dica">A próxima RM do mesmo contrato puxa automaticamente o "antes medido" do período anterior (que você ainda pode corrigir).</small>
      <button class="btn btn-primary btn-full" onclick="criarMedicao()">Criar medição</button>
    </div>`;

  $('#nm_contrato').addEventListener('change', e=>{
    const objeto = e.target.selectedOptions[0]?.dataset.objeto || '';
    $('#nm_obj').value = objeto;
  });
  $('#nm_contrato').dispatchEvent(new Event('change'));
}

async function criarMedicao(){
  const contrato_id = $('#nm_contrato').value;
  const contrato = CONTRATOS.find(c=>c.id===contrato_id);
  const rm = parseInt($('#nm_rm').value);
  const ini = $('#nm_ini').value, fim = $('#nm_fim').value;
  const mesV = $('#nm_mes').value;
  const mes = mesV ? mesV+'-01' : ini;

  if(!contrato || !rm || !ini || !fim){
    $('#msgNova').innerHTML = '<div class="msg msg-erro">Preencha contrato, RM e período.</div>';
    return;
  }

  const { data:ant } = await supabaseClient.from('medicoes')
    .select('id, rm_numero').eq('contrato_id', contrato_id)
    .lt('rm_numero', rm).order('rm_numero',{ascending:false}).limit(1);
  const anterior_id = ant && ant.length ? ant[0].id : null;

  const { data, error } = await supabaseClient.from('medicoes').insert({
    contrato_id,
    obra_id: contrato.obra_id,
    fornecedor_id: contrato.fornecedor_id,
    rm_numero: rm,
    periodo_inicio: ini, periodo_fim: fim, mes_referencia: mes,
    sub_contrato: contrato.numero || null,
    objeto: $('#nm_obj').value || null,
    medicao_anterior_id: anterior_id,
    criado_por: PERFIL.id
  }).select().single();

  if(error){
    $('#msgNova').innerHTML = `<div class="msg msg-erro">${esc(error.message)}</div>`;
    return;
  }
  registrarHistorico('criou medição', 'medicao', data.id, `RM ${rm} - ${contrato.fornecedores?.nome||''}`);

  if(anterior_id){
    const { data:itensAnt } = await supabaseClient.from('medicao_itens')
      .select('*').eq('medicao_id', anterior_id).order('ordem');
    if(itensAnt && itensAnt.length){
      const novos = itensAnt.map(i=>({
        medicao_id:data.id, ordem:i.ordem, item_codigo:i.item_codigo,
        descricao:i.descricao, unidade:i.unidade,
        qtd_total:i.qtd_total, preco_unitario:i.preco_unitario, qtd_periodo:0
      }));
      await supabaseClient.from('medicao_itens').insert(novos);
    }
  }
  abrirMedicao(data.id);
}

let MEDICAO_ATUAL = null;
let ITENS_ATUAIS = [];

async function abrirMedicao(id){
  await carregarRefs();
  const { data:m } = await supabaseClient.from('medicoes')
    .select('*, obras(nome,centro_custo), fornecedores(nome,logo_url), contratos(valor_contrato,numero)').eq('id', id).single();
  MEDICAO_ATUAL = m;

  const { data:itens } = await supabaseClient.from('v_medicao_itens')
    .select('*').eq('medicao_id', id).order('ordem');
  ITENS_ATUAIS = itens || [];

  desenharMedicao();
}

function desenharMedicao(){
  const m = MEDICAO_ATUAL;
  const el = $('#view-medicoes');
  const optsUn = s => UNIDADES.map(u=>`<option ${u.sigla===s?'selected':''}>${u.sigla}</option>`).join('');
  const bloqueado = m.status==='finalizada';

  const linhas = ITENS_ATUAIS.map((it)=>`
    <tr data-id="${it.id}">
      <td><input class="col-mini" value="${esc(it.item_codigo||'')}" onchange="editarItem('${it.id}','item_codigo',this.value)" ${bloqueado?'disabled':''}></td>
      <td><input style="text-transform:uppercase;min-width:220px" value="${esc(it.descricao||'')}" onchange="editarItem('${it.id}','descricao',this.value.toUpperCase())" ${bloqueado?'disabled':''}></td>
      <td><select onchange="editarItem('${it.id}','unidade',this.value)" ${bloqueado?'disabled':''}>${optsUn(it.unidade)}</select></td>
      <td><input type="number" class="col-mini num" value="${it.qtd_total}" step="0.0001" onchange="editarItem('${it.id}','qtd_total',this.value)" ${bloqueado?'disabled':''}></td>
      <td><input type="number" class="col-med num" value="${it.preco_unitario}" step="0.0001" onchange="editarItem('${it.id}','preco_unitario',this.value)" ${bloqueado?'disabled':''}></td>
      <td class="num">${brl(it.preco_total)}</td>
      <td><input type="number" class="col-mini num" value="${Number(it.qtd_antes)}" step="0.0001" onchange="editarItem('${it.id}','qtd_antes_manual',this.value)" ${bloqueado?'disabled':''} title="Editável"></td>
      <td><input type="number" class="col-med num" value="${Number(it.valor_antes)}" step="0.01" onchange="editarItem('${it.id}','valor_antes_manual',this.value)" ${bloqueado?'disabled':''} title="Editável"></td>
      <td><input type="number" class="col-mini num" value="${it.qtd_periodo}" step="0.0001" onchange="editarItem('${it.id}','qtd_periodo',this.value)" ${bloqueado?'disabled':''}></td>
      <td class="num">${brl(it.valor_periodo)}</td>
      <td class="num">${num(it.qtd_acumulada)}</td>
      <td class="num">${brl(it.valor_acumulado)}</td>
      <td>${bloqueado?'':`<button class="btn btn-perigo btn-sm" onclick="excluirItem('${it.id}')">x</button>`}</td>
    </tr>`).join('');

  const totPeriodo  = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.valor_periodo),0);
  const totAnterior = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.valor_antes),0);
  const totAcum     = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.valor_acumulado),0);
  const liquido = totPeriodo - Number(m.desconto||0) - Number(m.retencao||0);

  el.innerHTML = `
    <div class="card">
      <h2>RM ${m.rm_numero} - ${esc(m.fornecedores.nome)}
        <span style="display:flex;gap:8px">
          <button class="btn btn-secundario btn-sm" onclick="exportarExcel()">Excel (dados)</button>
          <button class="btn btn-secundario btn-sm" onclick="imprimirMedicao()">PDF / Imprimir</button>
          <button class="btn btn-secundario btn-sm" onclick="renderMedicoes()">Voltar à lista</button>
        </span>
      </h2>
      <div class="grid grid-4">
        <div><strong>Obra:</strong><br>${esc(m.obras.nome)}</div>
        <div><strong>Centro de custo:</strong><br>${esc(m.obras.centro_custo||'-')}</div>
        <div><strong>Objeto:</strong><br>${esc(m.objeto||'-')}</div>
        <div><strong>Periodo:</strong><br>${dataBR(m.periodo_inicio)} a ${dataBR(m.periodo_fim)}</div>
      </div>
      ${bloqueado?'<div class="msg msg-info">Medição finalizada (somente leitura).</div>':''}

      <div class="tabela-scroll" style="margin-top:18px">
        <table>
          <thead>
            <tr>
              <th>Item</th><th>Descrição dos serviços</th><th>UN</th>
              <th class="num">Qtd total</th><th class="num">Preço unit.</th><th class="num">Preço total</th>
              <th class="num">Qtd antes</th><th class="num">Valor antes</th>
              <th class="num">Qtd período</th><th class="num">Valor período</th>
              <th class="num">Qtd acum.</th><th class="num">Valor acum.</th><th></th>
            </tr>
          </thead>
          <tbody>${linhas || '<tr><td colspan="13" class="lista-vazia">Nenhum item. Adicione abaixo.</td></tr>'}</tbody>
        </table>
      </div>
      ${bloqueado?'':'<button class="btn btn-secundario btn-sm" style="margin-top:12px" onclick="adicionarItem()">+ Adicionar item</button>'}

      <div class="grid grid-2" style="margin-top:20px">
        <div><label>Desconto / Acréscimo (R$)</label>
          <input type="number" step="0.01" value="${m.desconto}" onchange="editarMedicao('desconto',this.value)" ${bloqueado?'disabled':''}></div>
        <div><label>Retenções (R$)</label>
          <input type="number" step="0.01" value="${m.retencao}" onchange="editarMedicao('retencao',this.value)" ${bloqueado?'disabled':''}></div>
        <div style="grid-column:1/-1"><label>Observações</label>
          <textarea onchange="editarMedicao('observacoes',this.value)" ${bloqueado?'disabled':''}>${esc(m.observacoes||'')}</textarea></div>
      </div>

      <div class="totais">
        <div class="total-box"><div class="rotulo">Total anterior</div><div class="valor">${brl(totAnterior)}</div></div>
        <div class="total-box"><div class="rotulo">Total no período (bruto)</div><div class="valor">${brl(totPeriodo)}</div></div>
        <div class="total-box"><div class="rotulo">Total acumulado</div><div class="valor">${brl(totAcum)}</div></div>
        <div class="total-box destaque"><div class="rotulo">Líquido a pagar</div><div class="valor">${brl(liquido)}</div></div>
      </div>

      ${bloqueado?'':`
      <div class="toolbar" style="margin-top:20px">
        <div class="spacer"></div>
        <button class="btn btn-primary" onclick="finalizarMedicao()">Finalizar medição</button>
      </div>`}
    </div>`;
}

async function adicionarItem(){
  const prox = ITENS_ATUAIS.length+1;
  const { error } = await supabaseClient.from('medicao_itens').insert({
    medicao_id: MEDICAO_ATUAL.id, ordem: prox, item_codigo: `1.1.${prox}`,
    descricao:'NOVO ITEM', unidade:'UN', qtd_total:0, preco_unitario:0, qtd_periodo:0
  });
  if(error){ toast(error.message,'erro'); return; }
  registrarHistorico('adicionou item', 'medicao', MEDICAO_ATUAL.id);
  abrirMedicao(MEDICAO_ATUAL.id);
}

async function editarItem(id, campo, valor){
  const numericos = ['qtd_total','preco_unitario','qtd_periodo','qtd_antes_manual','valor_antes_manual'];
  if(numericos.includes(campo)) valor = (valor===''||valor===null) ? null : parseFloat(valor);
  const { error } = await supabaseClient.from('medicao_itens').update({[campo]:valor}).eq('id',id);
  if(error){ toast(error.message,'erro'); return; }
  registrarHistorico('editou item', 'item', id, campo);
  abrirMedicao(MEDICAO_ATUAL.id);
}

async function excluirItem(id){
  if(!confirm('Excluir este item?')) return;
  await supabaseClient.from('medicao_itens').delete().eq('id',id);
  registrarHistorico('excluiu item', 'item', id);
  abrirMedicao(MEDICAO_ATUAL.id);
}

async function editarMedicao(campo, valor){
  const numericos = ['desconto','retencao'];
  if(numericos.includes(campo)) valor = parseFloat(valor)||0;
  await supabaseClient.from('medicoes').update({[campo]:valor}).eq('id',MEDICAO_ATUAL.id);
  MEDICAO_ATUAL[campo]=valor;
  registrarHistorico('editou medição', 'medicao', MEDICAO_ATUAL.id, campo);
  if(numericos.includes(campo)) abrirMedicao(MEDICAO_ATUAL.id);
}

async function finalizarMedicao(){
  if(!confirm('Finalizar a medição? Depois ela ficará somente leitura.')) return;
  await supabaseClient.from('medicoes').update({status:'finalizada'}).eq('id',MEDICAO_ATUAL.id);
  registrarHistorico('finalizou medição', 'medicao', MEDICAO_ATUAL.id);
  toast('Medição finalizada.','ok');
  abrirMedicao(MEDICAO_ATUAL.id);
}

</script>
<script>
// ============================================================
// MODULO ADMIN (obras, fornecedores, contratos, operadores, acessos, historico)
// ============================================================

// ---------- OBRAS ----------
async function renderObras(){
  const el = $('#view-obras');
  const { data:obras } = await supabaseClient.from('obras').select('*').order('nome');
  const linhas = (obras||[]).map(o=>`
    <tr>
      <td>${esc(o.nome)}</td><td>${esc(o.centro_custo||'-')}</td>
      <td>${o.ativa?'Ativa':'Inativa'}</td>
      <td class="acoes"><button class="btn btn-secundario btn-sm" onclick="editObra('${o.id}',\`${esc(o.nome)}\`,\`${esc(o.centro_custo||'')}\`,${o.ativa})">Editar</button></td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="card">
      <h2>Obras <button class="btn btn-primary btn-sm" onclick="editObra()">+ Nova obra</button></h2>
      <div id="formObra"></div>
      <table><thead><tr><th>Nome</th><th>Centro de custo</th><th>Status</th><th></th></tr></thead>
        <tbody>${linhas||'<tr><td colspan="4" class="lista-vazia">Nenhuma obra.</td></tr>'}</tbody></table>
    </div>`;
}
function editObra(id='',nome='',cc='',ativa=true){
  $('#formObra').innerHTML = `
    <div class="grid grid-3" style="margin-bottom:16px">
      <div><label>Nome da obra</label><input id="ob_nome" value="${esc(nome)}"></div>
      <div><label>Centro de custo</label><input id="ob_cc" value="${esc(cc)}"></div>
      <div><label>Status</label><select id="ob_ativa"><option value="true" ${ativa?'selected':''}>Ativa</option><option value="false" ${!ativa?'selected':''}>Inativa</option></select></div>
      <div style="grid-column:1/-1"><button class="btn btn-primary btn-sm" onclick="salvarObra('${id}')">Salvar</button>
      <button class="btn btn-secundario btn-sm" onclick="$('#formObra').innerHTML=''">Cancelar</button></div>
    </div>`;
}
async function salvarObra(id){
  const reg = { nome:$('#ob_nome').value.trim(), centro_custo:$('#ob_cc').value.trim()||null, ativa:$('#ob_ativa').value==='true' };
  if(!reg.nome){ toast('Informe o nome.','erro'); return; }
  const q = id ? supabaseClient.from('obras').update(reg).eq('id',id) : supabaseClient.from('obras').insert(reg);
  const { error } = await q;
  if(error){ toast(error.message,'erro'); return; }
  registrarHistorico(id?'editou obra':'criou obra','obra',id||null,reg.nome);
  toast('Obra salva.','ok');
  const { data } = await supabaseClient.from('obras').select('*').eq('ativa',true).order('nome');
  OBRAS_ACESSIVEIS = data||[];
  renderObras();
}

// ---------- FORNECEDORES (com logo) ----------
async function renderFornecedores(){
  const el = $('#view-fornecedores');
  const { data:fs } = await supabaseClient.from('fornecedores').select('*').order('nome');
  const linhas = (fs||[]).map(f=>`
    <tr>
      <td>${f.logo_url?`<img src="${f.logo_url}" style="height:28px;max-width:80px;object-fit:contain">`:'-'}</td>
      <td>${esc(f.nome)}</td><td>${esc(f.cnpj||'-')}</td><td>${esc(f.objeto||'-')}</td>
      <td>${f.ativo?'Ativo':'Inativo'}</td>
      <td class="acoes"><button class="btn btn-secundario btn-sm" onclick="editForn('${f.id}')">Editar</button></td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="card">
      <h2>Fornecedores <button class="btn btn-primary btn-sm" onclick="editForn()">+ Novo fornecedor</button></h2>
      <div id="formForn"></div>
      <table><thead><tr><th>Logo</th><th>Nome</th><th>CNPJ</th><th>Objeto</th><th>Status</th><th></th></tr></thead>
        <tbody>${linhas||'<tr><td colspan="6" class="lista-vazia">Nenhum fornecedor.</td></tr>'}</tbody></table>
    </div>`;
}
let FORN_LOGO_TEMP = null;
async function editForn(id=''){
  let f = { nome:'', cnpj:'', objeto:'', ativo:true, logo_url:null };
  if(id){
    const { data } = await supabaseClient.from('fornecedores').select('*').eq('id',id).single();
    if(data) f = data;
  }
  FORN_LOGO_TEMP = f.logo_url || null;
  $('#formForn').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:16px">
      <div><label>Nome / Contratada</label><input id="fn_nome" value="${esc(f.nome)}"></div>
      <div><label>CNPJ</label><input id="fn_cnpj" value="${esc(f.cnpj||'')}"></div>
      <div><label>Objeto</label><input id="fn_obj" value="${esc(f.objeto||'')}" placeholder="LOCAÇÃO DE EQUIPAMENTOS"></div>
      <div><label>Status</label><select id="fn_ativo"><option value="true" ${f.ativo?'selected':''}>Ativo</option><option value="false" ${!f.ativo?'selected':''}>Inativo</option></select></div>
      <div style="grid-column:1/-1">
        <label>Logo da empresa (aparece na medição)</label>
        <input type="file" id="fn_logo" accept="image/*" onchange="lerLogoForn(event)">
        <div id="fn_logo_preview" style="margin-top:8px">${f.logo_url?`<img src="${f.logo_url}" style="height:50px;max-width:160px;object-fit:contain;border:1px solid var(--cinza-borda);border-radius:6px;padding:4px">`:''}</div>
      </div>
      <div style="grid-column:1/-1"><button class="btn btn-primary btn-sm" onclick="salvarForn('${id}')">Salvar</button>
      <button class="btn btn-secundario btn-sm" onclick="$('#formForn').innerHTML='';FORN_LOGO_TEMP=null">Cancelar</button></div>
    </div>`;
}
function lerLogoForn(ev){
  const file = ev.target.files[0];
  if(!file) return;
  if(file.size > 500000){ toast('Logo muito grande (máx 500KB). Use uma imagem menor.','erro'); ev.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = e=>{
    FORN_LOGO_TEMP = e.target.result;
    $('#fn_logo_preview').innerHTML = `<img src="${FORN_LOGO_TEMP}" style="height:50px;max-width:160px;object-fit:contain;border:1px solid var(--cinza-borda);border-radius:6px;padding:4px">`;
  };
  reader.readAsDataURL(file);
}
async function salvarForn(id){
  const reg = {

  const el = $('#view-contratos');

  const linhas = (cs||[]).map(c=>`
    <tr>
      <td>${esc(c.obras?.nome||'')}</td>
      <td>${esc(c.fornecedores?.nome||'')}</td>
      <td>${esc(c.numero||'-')}</td>
      <td class="num">${c.valor_contrato?brl(c.valor_contrato):'-'}</td>
      <td>${esc(c.objeto||'-')}</td>
      <td>${c.ativo?'Ativo':'Inativo'}</td>
      <td class="acoes"><button class="btn btn-secundario btn-sm" onclick="editContrato('${c.id}')">Editar</button></td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="card">
      <h2>Contratos <button class="btn btn-primary btn-sm" onclick="editContrato()">+ Novo contrato</button></h2>

      <div id="formContrato"></div>
      <table><thead><tr><th>Obra</th><th>Fornecedor</th><th>No contrato</th><th class="num">Valor</th><th>Objeto</th><th>Status</th><th></th></tr></thead>
        <tbody>${linhas||'<tr><td colspan="6" class="lista-vazia">Nenhum contrato.</td></tr>'}</tbody></table>
    </div>`;
}
async function editContrato(id=''){
  let c = { obra_id:'', fornecedor_id:'', numero:'', objeto:'', ativo:true };
  if(id){
    const { data } = await supabaseClient.from('contratos').select('*').eq('id',id).single();
    if(data) c = data;
  }
  const { data:obras } = await supabaseClient.from('obras').select('*').eq('ativa',true).order('nome');
  const { data:forns } = await supabaseClient.from('fornecedores').select('*').eq('ativo',true).order('nome');
  const optsObra = (obras||[]).map(o=>`<option value="${o.id}" ${o.id===c.obra_id?'selected':''}>${esc(o.nome)}</option>`).join('');
  const optsForn = (forns||[]).map(f=>`<option value="${f.id}" data-objeto="${esc(f.objeto||'')}" ${f.id===c.fornecedor_id?'selected':''}>${esc(f.nome)}</option>`).join('');
  $('#formContrato').innerHTML = `
    <div class="grid grid-2" style="margin-bottom:16px">
      <div><label>Obra</label><select id="ct_obra">${optsObra}</select></div>
      <div><label>Fornecedor</label><select id="ct_forn">${optsForn}</select></div>
      <div><label>Nº do contrato / sub-contrato</label><input id="ct_num" value="${esc(c.numero||'')}"></div>
      <div><label>Valor do contrato (R$)</label><input type="number" step="0.01" id="ct_valor" value="${c.valor_contrato||0}"></div>
      <div><label>Status</label><select id="ct_ativo"><option value="true" ${c.ativo?'selected':''}>Ativo</option><option value="false" ${!c.ativo?'selected':''}>Inativo</option></select></div>
      <div style="grid-column:1/-1"><label>Objeto</label><input id="ct_obj" value="${esc(c.objeto||'')}" placeholder="LOCAÇÃO DE EQUIPAMENTOS"></div>
      <div style="grid-column:1/-1"><button class="btn btn-primary btn-sm" onclick="salvarContrato('${id}')">Salvar</button>
      <button class="btn btn-secundario btn-sm" onclick="$('#formContrato').innerHTML=''">Cancelar</button></div>
    </div>`;
  $('#ct_forn').addEventListener('change', e=>{
    const objeto = e.target.selectedOptions[0]?.dataset.objeto || '';
    if(!$('#ct_obj').value) $('#ct_obj').value = objeto;
  });
}
async function salvarContrato(id){
  const reg = {
    obra_id:$('#ct_obra').value, fornecedor_id:$('#ct_forn').value,
    numero:$('#ct_num').value.trim()||null, objeto:$('#ct_obj').value.trim().toUpperCase()||null,
    valor_contrato: parseFloat($('#ct_valor').value)||0,
    ativo:$('#ct_ativo').value==='true'
  };
  if(!reg.obra_id || !reg.fornecedor_id){ toast('Escolha obra e fornecedor.','erro'); return; }
  const q = id ? supabaseClient.from('contratos').update(reg).eq('id',id) : supabaseClient.from('contratos').insert(reg);
  const { error } = await q;
  if(error){ toast(error.message,'erro'); return; }
  registrarHistorico(id?'editou contrato':'criou contrato','contrato',id||null,null);
  toast('Contrato salvo.','ok');
  renderContratos();
}

async function renderOperadores(){
  const el = $('#view-operadores');
  const { data:ps } = await supabaseClient.from('perfis').select('*').order('nome');
  const linhas = (ps||[]).map(p=>`
    <tr><td>${esc(p.nome)}</td><td>${esc(p.email)}</td>
      <td><span class="badge ${p.role==='admin'?'badge-admin':'badge-operador'}">${p.role}</span></td>
      <td>${p.ativo?'Ativo':'Inativo'}</td></tr>`).join('');
  el.innerHTML = `
    <div class="card">
      <h2>Operadores</h2>
      <div class="msg msg-info">O operador criado aqui só verá obras que você liberar na aba "Liberar Obras".</div>
      <div class="grid grid-4" style="margin:16px 0">
        <div><label>Nome</label><input id="op_nome"></div>
        <div><label>E-mail</label><input id="op_email" type="email"></div>
        <div><label>Senha provisória</label><input id="op_senha" type="text" placeholder="mín. 6 caracteres"></div>
        <div><label>Perfil</label><select id="op_role"><option value="operador">Operador</option><option value="admin">Administrador</option></select></div>
        <div style="grid-column:1/-1"><button class="btn btn-primary btn-sm" onclick="criarOperador()">Criar login</button></div>
      </div>
      <table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th></tr></thead>
        <tbody>${linhas||''}</tbody></table>
    </div>`;
}
async function criarOperador(){
  const nome = $('#op_nome').value.trim();
  const email = $('#op_email').value.trim();
  const senha = $('#op_senha').value;
  const role = $('#op_role').value;
  if(!nome||!email||senha.length<6){ toast('Preencha nome, e-mail e senha (mín. 6).','erro'); return; }
  const { data:{ session } } = await supabaseClient.auth.getSession();
  const resp = await fetch(`${SUPABASE_URL}/functions/v1/criar-operador`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
    body: JSON.stringify({ nome, email, senha, role })
  });
  const out = await resp.json();
  if(!resp.ok){ toast(out.error||'Erro ao criar.','erro'); return; }
  registrarHistorico('criou operador','perfil',out.id||null,email);
  toast('Login criado com sucesso.','ok');
  renderOperadores();
}

// ---------- LIBERAR OBRAS ----------
async function renderAcessos(){
  const el = $('#view-acessos');
  const { data:ops } = await supabaseClient.from('perfis').select('*').eq('role','operador').eq('ativo',true).order('nome');
  const { data:obras } = await supabaseClient.from('obras').select('*').eq('ativa',true).order('nome');
  const { data:acessos } = await supabaseClient.from('acesso_obra').select('*');
  const mapa = {};
  (acessos||[]).forEach(a=>{ (mapa[a.user_id]=mapa[a.user_id]||new Set()).add(a.obra_id); });
  const blocos = (ops||[]).map(op=>{
    const liberadas = mapa[op.id] || new Set();
    const checks = (obras||[]).map(o=>`
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;text-transform:none">
        <input type="checkbox" style="width:auto" ${liberadas.has(o.id)?'checked':''}
          onchange="toggleAcesso('${op.id}','${o.id}',this.checked)"> ${esc(o.nome)}
      </label>`).join('');
    return `<div class="card">
      <h2>${esc(op.nome)} <span class="chip">${esc(op.email)}</span></h2>
      <div class="grid grid-3">${checks||'<div>Nenhuma obra cadastrada.</div>'}</div>
    </div>`;
  }).join('');
  el.innerHTML = blocos || `<div class="card"><div class="lista-vazia">Nenhum operador cadastrado ainda.</div></div>`;
}
async function toggleAcesso(user_id, obra_id, liberar){
  if(liberar){
    const { error } = await supabaseClient.from('acesso_obra').insert({ user_id, obra_id });
    if(error){ toast(error.message,'erro'); return; }
    registrarHistorico('liberou obra','acesso',obra_id);
    toast('Obra liberada.','ok');
  } else {
    const { error } = await supabaseClient.from('acesso_obra').delete().match({ user_id, obra_id });
    if(error){ toast(error.message,'erro'); return; }
    registrarHistorico('removeu acesso','acesso',obra_id);
    toast('Acesso removido.','ok');
  }
}

// ---------- MEU PERFIL (qualquer usuario) ----------
async function renderPerfil(){
  const el = document.getElementById('view-perfil');
  el.innerHTML = `
    <div class="card" style="max-width:560px">
      <h2>Meu perfil</h2>
      <div id="msgPerfil"></div>
      <div class="grid" style="gap:14px">
        <div><label>Nome de exibição</label><input id="pf_nome" value="${esc(PERFIL.nome||'')}"></div>
        <div><label>E-mail (somente leitura)</label><input value="${esc(PERFIL.email||'')}" disabled></div>
        <div><button class="btn btn-primary btn-sm" onclick="salvarNomePerfil()">Salvar nome</button></div>
      </div>
      <hr style="margin:22px 0;border:none;border-top:1px solid var(--cinza-borda)">
      <h2>Trocar senha</h2>
      <div class="grid" style="gap:14px">
        <div><label>Nova senha</label><input type="password" id="pf_senha1" placeholder="mín. 6 caracteres"></div>
        <div><label>Confirmar nova senha</label><input type="password" id="pf_senha2"></div>
        <div><button class="btn btn-primary btn-sm" onclick="trocarSenha()">Alterar senha</button></div>
      </div>
    </div>`;
}

async function salvarNomePerfil(){
  const nome = document.getElementById('pf_nome').value.trim();
  if(!nome){ toast('Informe o nome.','erro'); return; }
  const { error } = await supabaseClient.from('perfis').update({nome}).eq('id', PERFIL.id);
  if(error){ toast(error.message,'erro'); return; }
  PERFIL.nome = nome;
  document.getElementById('userNome').textContent = nome;
  registrarHistorico('alterou próprio nome','perfil',PERFIL.id);
  document.getElementById('msgPerfil').innerHTML = '<div class="msg msg-ok">Nome atualizado.</div>';
}

async function trocarSenha(){
  const s1 = document.getElementById('pf_senha1').value;
  const s2 = document.getElementById('pf_senha2').value;
  const msg = document.getElementById('msgPerfil');
  if(s1.length < 6){ msg.innerHTML = '<div class="msg msg-erro">A senha deve ter no mínimo 6 caracteres.</div>'; return; }
  if(s1 !== s2){ msg.innerHTML = '<div class="msg msg-erro">As senhas não coincidem.</div>'; return; }
  const { error } = await supabaseClient.auth.updateUser({ password: s1 });
  if(error){ msg.innerHTML = `<div class="msg msg-erro">${esc(error.message)}</div>`; return; }
  registrarHistorico('alterou própria senha','perfil',PERFIL.id);
  msg.innerHTML = '<div class="msg msg-ok">Senha alterada com sucesso.</div>';
  document.getElementById('pf_senha1').value='';
  document.getElementById('pf_senha2').value='';
}

</script>
<script>
// ============================================================
// EXPORTACAO - Excel (.xlsx) e PDF no formato da medicao Axial
// ============================================================
// Usa MEDICAO_ATUAL e ITENS_ATUAIS (carregados em medicoes.js).

function _totaisMedicao(){
  const m = MEDICAO_ATUAL;
  const totPeriodo  = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.valor_periodo),0);
  const totAnterior = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.valor_antes),0);
  const totAcum     = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.valor_acumulado),0);
  const totalContratado = ITENS_ATUAIS.reduce((s,i)=>s+Number(i.preco_total),0);
  const liquido = totPeriodo - Number(m.desconto||0) - Number(m.retencao||0);
  return { totPeriodo, totAnterior, totAcum, totalContratado, saldo: totalContratado-totAcum, liquido };
}

function _nomeArquivo(ext){
  const m = MEDICAO_ATUAL;
  const forn = (m.fornecedores?.nome||'medicao').replace(/[^\w]+/g,'_');
  const mes  = (m.mes_referencia||'').slice(0,7);
  return `Medicao_${forn}_RM${m.rm_numero}_${mes}.${ext}`;
}

// ============================================================
// EXCEL
// ============================================================
function exportarExcel(){
  if(!MEDICAO_ATUAL){ toast('Abra uma medição primeiro.','erro'); return; }
  const m = MEDICAO_ATUAL;
  const t = _totaisMedicao();

  const linhas = [];
  linhas.push(['','RELATÓRIO DE MEDIÇÃO','','','','','','RM no', m.rm_numero]);
  linhas.push([]);
  linhas.push(['CONTRATADA:', m.fornecedores?.nome||'', '', 'CLIENTE:', 'CONSTRUTORA AXIAL LTDA']);
  linhas.push(['OBJETO:', m.objeto||'', '', 'OBRA:', m.obras?.nome||'']);
  linhas.push(['CENTRO DE CUSTO:', m.obras?.centro_custo||'', '', 'SUB-CONTRATO No:', m.sub_contrato||'']);
  linhas.push(['PERIODO:', `${dataBR(m.periodo_inicio)} a ${dataBR(m.periodo_fim)}`, '', 'MES DE REFERENCIA:', (m.mes_referencia||'').slice(0,7)]);
  linhas.push([]);
  linhas.push(['ITEM','DESCRICAO DOS SERVICOS','UN','QTD TOTAL','PRECO UNITARIO (R$)','PRECO TOTAL (R$)',
               'ANTES MEDIDO - QTD','ANTES MEDIDO - VALOR (R$)',
               'NO PERIODO - QTD','NO PERIODO - VALOR (R$)',
               'ACUMULADO - QTD','ACUMULADO - VALOR (R$)']);
  ITENS_ATUAIS.forEach(it=>{
    linhas.push([
      it.item_codigo||'', it.descricao||'', it.unidade||'',
      Number(it.qtd_total), Number(it.preco_unitario), Number(it.preco_total),
      Number(it.qtd_antes), Number(it.valor_antes),
      Number(it.qtd_periodo), Number(it.valor_periodo),
      Number(it.qtd_acumulada), Number(it.valor_acumulado)
    ]);
  });
  linhas.push([]);
  linhas.push(['','','','','','TOTAL CONTRATADO', t.totalContratado]);
  linhas.push(['','','','','','SALDO CONTRATUAL', t.saldo]);
  linhas.push(['','','','','','TOTAL ANTERIOR', t.totAnterior]);
  linhas.push(['','','','','','TOTAL NO PERIODO (BRUTO A FATURAR)', t.totPeriodo]);
  linhas.push(['','','','','','TOTAL ACUMULADO', t.totAcum]);
  linhas.push(['','','','','','DESCONTO / ACRESCIMO', Number(m.desconto||0)]);
  linhas.push(['','','','','','RETENCOES', Number(m.retencao||0)]);
  linhas.push(['','','','','','LIQUIDO A PAGAR', t.liquido]);
  if(m.observacoes){ linhas.push([]); linhas.push(['OBSERVACOES:', m.observacoes]); }

  const ws = XLSX.utils.aoa_to_sheet(linhas);
  ws['!cols'] = [{wch:8},{wch:40},{wch:6},{wch:12},{wch:16},{wch:16},{wch:12},{wch:16},{wch:12},{wch:16},{wch:12},{wch:16}];
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let R=7; R<=range.e.r; R++){
    [4,5,7,9,11].forEach(C=>{
      const cell = ws[XLSX.utils.encode_cell({r:R,c:C})];
      if(cell && typeof cell.v==='number') cell.z = '#,##0.00';
    });
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'MEDICAO');
  XLSX.writeFile(wb, _nomeArquivo('xlsx'));
}

// ============================================================
// PDF
// ============================================================
function exportarPDF(){
  if(!MEDICAO_ATUAL){ toast('Abra uma medição primeiro.','erro'); return; }
  const m = MEDICAO_ATUAL;
  const t = _totaisMedicao();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const azul = [27,123,184];
  const W = doc.internal.pageSize.getWidth();

  // logo da Axial (cliente) - sempre presente
  try{ doc.addImage(LOGO_DATA_URL, 'PNG', 12, 8, 38, 24); }catch(e){}
  // logo da contratada (fornecedor), se houver
  if(m.fornecedores?.logo_url){
    try{ doc.addImage(m.fornecedores.logo_url, 'PNG', W-58, 8, 44, 24); }catch(e){}
  }

  doc.setFontSize(15); doc.setTextColor.apply(doc,azul); doc.setFont(undefined,'bold');
  doc.text('RELATÓRIO DE MEDIÇÃO', W/2, 16, {align:'center'});
  doc.setFontSize(10); doc.setTextColor(60);
  doc.text(`RM no ${m.rm_numero}`, W/2, 23, {align:'center'});

  doc.setFontSize(9); doc.setFont(undefined,'normal'); doc.setTextColor(40);
  let y = 38;
  const L = 12, C = W/2+4;
  doc.setFont(undefined,'bold'); doc.text('Contratada:', L, y);
  doc.setFont(undefined,'normal'); doc.text(String(m.fornecedores?.nome||''), L+24, y);
  doc.setFont(undefined,'bold'); doc.text('Cliente:', C, y);
  doc.setFont(undefined,'normal'); doc.text('CONSTRUTORA AXIAL LTDA', C+18, y);
  y+=5;
  doc.setFont(undefined,'bold'); doc.text('Objeto:', L, y);
  doc.setFont(undefined,'normal'); doc.text(String(m.objeto||'-'), L+24, y);
  doc.setFont(undefined,'bold'); doc.text('Obra:', C, y);
  doc.setFont(undefined,'normal'); doc.text(String(m.obras?.nome||''), C+18, y);
  y+=5;
  doc.setFont(undefined,'bold'); doc.text('Periodo:', L, y);
  doc.setFont(undefined,'normal'); doc.text(`${dataBR(m.periodo_inicio)} a ${dataBR(m.periodo_fim)}`, L+24, y);
  doc.setFont(undefined,'bold'); doc.text('Centro de custo:', C, y);
  doc.setFont(undefined,'normal'); doc.text(String(m.obras?.centro_custo||'-'), C+30, y);

  const head = [[
    'Item','Descricao','UN','Qtd total','Pr. unit.','Pr. total',
    'Qtd antes','Vlr antes','Qtd per.','Vlr periodo','Qtd acum.','Vlr acum.'
  ]];
  const body = ITENS_ATUAIS.map(it=>[
    it.item_codigo||'', it.descricao||'', it.unidade||'',
    num(it.qtd_total), brl(it.preco_unitario), brl(it.preco_total),
    num(it.qtd_antes), brl(it.valor_antes),
    num(it.qtd_periodo), brl(it.valor_periodo),
    num(it.qtd_acumulada), brl(it.valor_acumulado)
  ]);

  doc.autoTable({
    head, body, startY: y+5,
    theme:'grid',
    styles:{ fontSize:7, cellPadding:1.5, overflow:'linebreak' },
    headStyles:{ fillColor:azul, textColor:255, fontSize:7, halign:'center' },
    columnStyles:{
      0:{cellWidth:14}, 1:{cellWidth:54}, 2:{cellWidth:12},
      3:{halign:'right'},4:{halign:'right'},5:{halign:'right'},6:{halign:'right'},
      7:{halign:'right'},8:{halign:'right'},9:{halign:'right'},10:{halign:'right'},11:{halign:'right'}
    },
    margin:{left:12,right:12}
  });

  let fy = doc.lastAutoTable.finalY + 6;
  if(fy > doc.internal.pageSize.getHeight()-40){ doc.addPage('landscape'); fy = 20; }
  const tot = [
    ['Total contratado', brl(t.totalContratado)],
    ['Saldo contratual', brl(t.saldo)],
    ['Total anterior', brl(t.totAnterior)],
    ['Total no período (bruto)', brl(t.totPeriodo)],
    ['Total acumulado', brl(t.totAcum)],
    ['Desconto / Acrescimo', brl(m.desconto||0)],
    ['Retencoes', brl(m.retencao||0)],
  ];
  doc.autoTable({
    body: tot, startY: fy, theme:'plain',
    styles:{ fontSize:9, cellPadding:1 },
    columnStyles:{ 0:{cellWidth:60,fontStyle:'bold'}, 1:{cellWidth:40,halign:'right'} },
    margin:{left:W-120}
  });
  let ly = doc.lastAutoTable.finalY + 2;
  doc.setFillColor.apply(doc,azul); doc.rect(W-120, ly, 100, 9, 'F');
  doc.setTextColor(255); doc.setFont(undefined,'bold'); doc.setFontSize(11);
  doc.text('LIQUIDO A PAGAR:', W-118, ly+6);
  doc.text(brl(t.liquido), W-22, ly+6, {align:'right'});

  if(m.observacoes){
    doc.setTextColor(60); doc.setFont(undefined,'normal'); doc.setFontSize(8);
    doc.text('Observacoes: '+m.observacoes, 12, ly+6, {maxWidth: W-150});
  }

  let ay = ly + 24;
  if(ay > doc.internal.pageSize.getHeight()-20) { doc.addPage('landscape'); ay = 40; }
  doc.setDrawColor(120); doc.setTextColor(60); doc.setFontSize(9);
  doc.line(30, ay, 110, ay); doc.text('Responsavel Axial', 50, ay+5);
  doc.line(W-110, ay, W-30, ay); doc.text('Contratada', W-80, ay+5);

  doc.save(_nomeArquivo('pdf'));
}

</script>

  const totAnterior = itens.reduce((s,i)=>s+Number(i.valor_antes),0);
  const totAcum     = itens.reduce((s,i)=>s+Number(i.valor_acumulado),0);
  // valor contratado vem do CONTRATO; se ausente, cai para a soma dos precos totais
  const valorContrato = Number(m.contratos?.valor_contrato || 0)
        || itens.reduce((s,i)=>s+Number(i.preco_total),0);
  const desconto = Number(m.desconto||0), retencao = Number(m.retencao||0);
  const saldo = valorContrato - totAcum;
  const liquido = totPeriodo - desconto - retencao;
  const pct = (v)=> valorContrato? (v/valorContrato*100):0;

  const logoForn = m.fornecedores?.logo_url || '';
  const mesRef = (()=>{ const d=m.mes_referencia; if(!d) return '';

  <tr class="cinza b">

<script>
// ===== handler do formulário de login =====
(function(){
  const form = document.getElementById('formLogin');
  if(!form) return;
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('btnEntrar');
    const msg = document.getElementById('msg');
    btn.disabled = true; btn.textContent = 'Entrando...';
    msg.innerHTML = '';
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('senha').value
    });
    if(error){
      msg.innerHTML = '<div class="msg msg-erro">E-mail ou senha inválidos.</div>';
      btn.disabled = false; btn.textContent = 'Entrar';
    } else {
      location.reload();
    }
  });
})();
</script>
